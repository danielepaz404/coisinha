<html>

<head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
            background-image: url('assets/Bliss\ \(3840x2160\).jpg');
            background-size: cover;
        }

        footer {
            background-color: #225ad9;
            background: linear-gradient(180deg, rgba(73, 147, 230, 1) 0%, rgba(34, 87, 213, 1) 20%, rgba(37, 97, 222, 1) 100%);
            height: 32px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            overflow: hidden;
        }

        #start-button {
            background: linear-gradient(180deg, rgba(139, 190, 140, 1) 15%, rgba(40, 129, 40, 1) 30%, rgba(68, 168, 68, 1) 100%);
            height: 42px;
            padding: 4px 24px 0 12px;
            color: #fff;
            text-shadow: 1px 1px #000;
            font-style: italic;
            font-size: 18px;
            font-weight: 700;
            border-radius: 0 18px 18px 0;
            box-sizing: border-box;
            border: 0;
            box-shadow: 0px 0px 12px -6px black inset;
            margin-top: -6px;
            margin-bottom: 0;
        }

        #start-button img {
            height: 20px;
            width: 20px;
            vertical-align: text-bottom;
            margin-right: 2px;
        }

        button {
            cursor: pointer;
        }

    </style>
</head>

<body>
    <footer>
        <button id="start-button"> <img src="assets/Windows XP.ico" alt="windows xp start icon">start</button>
    </footer>
</body>

</html>
